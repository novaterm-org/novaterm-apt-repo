name: Deploy APT Repository

# Deploys the APT repository to GitHub Pages.
# This is a lightweight deployment workflow that runs when
# the import-packages workflow has generated new output,
# or when manually triggered for re-deployment.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dists/**'
      - 'pool/**'
      - 'pubkey.gpg'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build APT repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev python3 gnupg

      - name: Import GPG key (if available)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import --no-tty 2>/dev/null
            GPG_KEY_ID=$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
            echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          fi

      - name: Generate APT repository metadata
        run: |
          SIGN_FLAG=""
          [ -n "$GPG_KEY_ID" ] && SIGN_FLAG="--sign"

          # Determine input source (pool preferred, fallback to debs)
          INPUT_DIR=""
          if [ -d "pool" ] && find pool -name "*.deb" | head -1 | grep -q .; then
            INPUT_DIR="pool/"
          elif [ -d "debs" ] && ls debs/*.deb >/dev/null 2>&1; then
            INPUT_DIR="debs/"
          fi

          if [ -n "$INPUT_DIR" ]; then
            python3 novaterm-apt-repo "$INPUT_DIR" output/ novaterm main $SIGN_FLAG || \
            python3 novaterm-apt-repo "$INPUT_DIR" output/ novaterm main
          elif [ -d "dists" ]; then
            # Use pre-existing dists/ directory
            mkdir -p output
            cp -r dists output/ 2>/dev/null || true
          else
            echo "::warning::No packages or dists found. Creating empty repository."
            mkdir -p output/dists/novaterm/main/binary-aarch64
            mkdir -p output/dists/novaterm/main/binary-all
          fi

          mkdir -p output

          # Export GPG public key
          if [ -n "$GPG_KEY_ID" ]; then
            gpg --export --armor "$GPG_KEY_ID" > output/pubkey.gpg
          elif [ -f "pubkey.gpg" ]; then
            cp pubkey.gpg output/pubkey.gpg
          else
            echo "# NovaTerm APT Repository GPG Key" > output/pubkey.gpg
            echo "# Use [trusted=yes] in sources.list for unsigned repos" >> output/pubkey.gpg
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4